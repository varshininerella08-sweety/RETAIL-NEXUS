<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4CAF50,#2196F3);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{
    background:white;
    width:100%;
    max-width:400px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.login-box h1{
    text-align:center;
    color:#2E7D32;
    margin-bottom:10px;
}

.login-box p{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#2E7D32;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1B5E20;
}

.links{
    text-align:center;
    margin-top:15px;
}

.links a{
    text-decoration:none;
    color:#2E7D32;
    font-size:15px;
}

@media(max-width:600px){
    .login-box{
        padding:20px;
    }

    .login-box h1{
        font-size:28px;
    }
}
</style>
</head>

<body>

<div class="login-box">

<h1>Retail Nexus</h1>
<p>Login to Continue</p>

<form onsubmit="return login()">

<input type="text" id="username" placeholder="Username" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="links">
<a href="index.html">⬅ Back to Home</a>
</div>

</div>

<script>
function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1234"){
    alert("Login Successful");
    window.location.href="dashboard.html";
}
else{
    alert("Invalid Username or Password");
}

return false;
}
</script>

</body>
