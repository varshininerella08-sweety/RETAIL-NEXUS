<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    overflow-x:hidden;
}

header{
    background:#2E8B57;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#333;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    padding:15px 20px;
}

nav a:hover{
    background:#2E8B57;
}

.container{
    width:90%;
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    color:#2E8B57;
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

input,
textarea{
    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#2E8B57;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#256b45;
}

footer{
    background:#2E8B57;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

@media(max-width:768px){
    nav{
        flex-direction:column;
    }

    nav a{
        text-align:center;
        border-bottom:1px solid #555;
    }

    .container{
        width:95%;
    }
}
</style>
</head>

<h2>Contact Us</h2>

<form>
<label>Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Email</label>
<input type="email" placeholder="Enter your email" required>

<label>Message</label>
<textarea rows="5" placeholder="Enter your message" required></textarea>

<button type="submit">Send Message</button>
</form>
